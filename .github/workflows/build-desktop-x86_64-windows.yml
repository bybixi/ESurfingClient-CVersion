name: Build Desktop x86_64 Windows Binary

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      full_version:
        required: true
        type: string
      openssl_version:
        required: true
        type: string
      curl_version:
        required: true
        type: string
      tail_wind_labs_version:
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: debian:13

    steps:
      - uses: actions/checkout@v6

      - name: 安装软件包 (最多重试 3 次)
        run: |
          PACKAGES="cmake make ninja-build gcc-mingw-w64-x86-64 g++-mingw-w64-x86-64 mingw-w64-tools upx-ucl wget file zip perl libperl-dev"

          for i in 1 2 3; do
            echo "尝试 $i: 正在安装 $PACKAGES"
            if apt-get update && apt-get install -y $PACKAGES; then
              echo "✅ 所有软件包已完成安装"
              break
            fi
            echo "❌ 尝试 $i 失败"
            sleep 3
          done

      - name: 创建工具链
        run: |
          cd esurfingclient/esurfing
          
          cat > toolchain-mingw64.cmake << 'EOF'
          set(CMAKE_SYSTEM_NAME Windows)
          set(CMAKE_SYSTEM_PROCESSOR x86_64)
          
          set(CMAKE_C_COMPILER x86_64-w64-mingw32-gcc)
          set(CMAKE_CXX_COMPILER x86_64-w64-mingw32-g++)
          set(CMAKE_RC_COMPILER x86_64-w64-mingw32-windres)
          
          set(CMAKE_FIND_ROOT_PATH /usr/x86_64-w64-mingw32)
          
          set(CMAKE_FIND_ROOT_PATH_MODE_PROGRAM NEVER)
          set(CMAKE_FIND_ROOT_PATH_MODE_LIBRARY ONLY)
          set(CMAKE_FIND_ROOT_PATH_MODE_INCLUDE ONLY)
          EOF

      - name: 获取 OpenSSL 缓存
        id: cache-openssl
        uses: actions/cache@v5
        with:
          path: |
            /usr/x86_64-w64-mingw32/lib/libcrypto.a
            /usr/x86_64-w64-mingw32/include/openssl
          key: openssl-${{ inputs.openssl_version }}-mingw64-x86_64

      - name: 构建 libOpenSSL 静态链接库
        if: steps.cache-openssl.outputs.cache-hit != 'true'
        run: |
          cd /tmp
          wget https://github.com/openssl/openssl/releases/download/openssl-${{ inputs.openssl_version }}/openssl-${{ inputs.openssl_version }}.tar.gz
          tar -xzf openssl-${{ inputs.openssl_version }}.tar.gz
          cd openssl-${{ inputs.openssl_version }}
          
          ./Configure mingw64 \
            --cross-compile-prefix=x86_64-w64-mingw32- \
            --prefix=/usr/x86_64-w64-mingw32 \
            --libdir=lib \
            no-shared \
            no-tests \
            no-docs \
            no-apps \
            no-tls \
            no-bf \
            no-cast \
            no-idea \
            no-rc2 \
            no-rc4 \
            no-rc5 \
            no-seed \
            no-aria \
            no-camellia \
            no-sm2 \
            no-sm3 \
            no-mdc2 \
            no-rmd160 \
            no-whirlpool \
            no-blake2 \
            no-md4 \
            no-dtls \
            no-quic \
            no-sctp \
            no-srp \
            no-zlib \
            no-zstd \
            no-brotli \
            no-ktls \
            no-rdrand \
            no-asan \
            no-msan \
            no-ubsan \
            no-trace \
            no-egd \
            no-krb5kdf \
            no-scrypt \
            no-x942kdf \
            no-x963kdf \
            no-srtp \
            no-ocsp \
            no-cms \
            no-ts
          
          make -j$(nproc)
          make install

      - name: 获取 libcurl 缓存
        id: cache-curl
        uses: actions/cache@v5
        with:
          path: |
            /usr/x86_64-w64-mingw32/lib/libcurl.a
            /usr/x86_64-w64-mingw32/include/curl
          key: curl-${{ inputs.curl_version }}-mingw64-x86_64

      - name: 构建 libcurl 静态链接库
        if: steps.cache-curl.outputs.cache-hit != 'true'
        run: |
          cd /tmp
          wget https://curl.se/download/curl-${{ inputs.curl_version }}.tar.gz
          tar -xzf curl-${{ inputs.curl_version }}.tar.gz
          cd curl-${{ inputs.curl_version }}
          
          ./configure --host=x86_64-w64-mingw32 \
            --prefix=/usr/x86_64-w64-mingw32 \
            --enable-static \
            --disable-shared \
            --without-ssl \
            --enable-http \
            --enable-proxy \
            --enable-cookies \
            --enable-basic-auth \
            --enable-digest-auth \
            --disable-ftp \
            --disable-file \
            --disable-ldap \
            --disable-ldaps \
            --disable-rtsp \
            --disable-dict \
            --disable-telnet \
            --disable-tftp \
            --disable-pop3 \
            --disable-imap \
            --disable-smb \
            --disable-smtp \
            --disable-gopher \
            --disable-mqtt \
            --disable-websockets \
            --disable-bearer-auth \
            --disable-kerberos-auth \
            --disable-negotiate-auth \
            --disable-ntlm \
            --disable-tls-srp \
            --disable-aws \
            --disable-rtmp \
            --without-brotli \
            --without-zstd \
            --without-libpsl \
            --without-libssh2 \
            --without-librtmp \
            --without-libidn2 \
            --without-nghttp2 \
            --without-ngtcp2 \
            --without-nghttp3 \
            --without-quiche \
            --without-msh3 \
            --without-libgsasl \
            --without-libssh \
            --without-wolfssh \
            --without-hyper \
            --without-zlib \
            --disable-ares \
            --disable-rt \
            --disable-threaded-resolver \
            --disable-ipv6 \
            --disable-manual \
            --disable-docs \
            --disable-verbose \
            --disable-versioned-symbols \
            --disable-sspi
          
          make -j$(nproc)
          make install

      - name: 构建 ESurfingClient 程序
        run: |
          cd esurfingclient/esurfing
          
          cmake -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE=toolchain-mingw64.cmake \
            -DBUILD_SHARED_LIBS=OFF \
            -B build \
            -S .
          
          cmake --build build -j$(nproc)
          
          cp build/ESurfingClient.exe ../../ESurfingClient-${{ inputs.full_version }}-windows-x86_64.exe
          
          x86_64-w64-mingw32-objdump -p ../../ESurfingClient-${{ inputs.full_version }}-windows-x86_64.exe | grep "DLL Name" | head -20
          
          upx --best --lzma ../../ESurfingClient-${{ inputs.full_version }}-windows-x86_64.exe || true
          
          ls -lh ../../ESurfingClient-${{ inputs.full_version }}-windows-x86_64.exe

      - name: 验证
        run: |
          if [ -f "ESurfingClient-${{ inputs.full_version }}-windows-x86_64.exe" ]; then
            echo "✅ 构建成功"
            echo "📏 文件大小: $(stat -c%s ESurfingClient-${{ inputs.full_version }}-windows-x86_64.exe) bytes"

            echo "🔍 检查依赖:"
            deps=$(x86_64-w64-mingw32-objdump -p ESurfingClient-${{ inputs.full_version }}-windows-x86_64.exe | grep "DLL Name" || true)
            echo "$deps" | head -20

            if echo "$deps" | grep -qE "libcurl|libssl|libcrypto|libssh2|libnghttp2|libzstd|libidn2|libpsl|libbrotli|libunistring|libiconv"; then
              echo "❌ 错误: 链接了第三方动态库"
              echo "$deps" | grep -E "libcurl|libssl|libcrypto|libssh2|libnghttp2|libzstd|libidn2|libpsl|libbrotli|libunistring|libiconv"
              exit 1
            else
              echo "✅ 完全静态: 没有链接第三方动态库"
            fi
          else
            echo "❌ 未找到二进制文件"
            exit 1
          fi

      - name: 获取 web 处理缓存
        id: cache-web
        uses: actions/cache@v5
        with:
          path: tailwindcss-linux-x64
          key: tailwindcss-${{ inputs.tail_wind_labs_version }}-linux-x86_64

      - name: 下载 tailwind_labs 打包程序
        if: steps.cache-web.outputs.cache-hit != 'true'
        run: |
          wget https://github.com/tailwindlabs/tailwindcss/releases/download/${{ inputs.tail_wind_labs_version }}/tailwindcss-linux-x64
          chmod +x tailwindcss-linux-x64

      - name: 处理 web 文件
        run: |
          cp -r esurfingclient/esurfing/portal ./
          mkdir portal/assets/css
          
          wget -O portal/assets/js/alpine.js https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js
          wget -O portal/daisyui.mjs https://github.com/saadeghi/daisyui/releases/latest/download/daisyui.mjs
          
          ./tailwindcss-linux-x64 -i portal/input.css -o portal/assets/css/output.css --minify
          rm portal/input.css
          rm portal/daisyui.mjs
          
          sed -i 's#https://cdn.jsdelivr.net/npm/daisyui@5#assets/css/output.css#g' portal/index.html
          
          sed -i 's#<link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css"##g' portal/index.html
          
          sed -i 's#rel="stylesheet" type="text/css" />##g' portal/index.html
          
          sed -i 's#<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>##g' portal/index.html
          
          sed -i 's#https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js#assets/js/alpine.js#g' portal/index.html

      - name: 打包成 zip 压缩包
        run: |
          zip -r esurfingclient-${{ inputs.full_version }}-windows-x86_64.zip ESurfingClient-${{ inputs.full_version }}-windows-x86_64.exe portal/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: esurfingclient-${{ inputs.full_version }}-windows-x86_64
          path: esurfingclient-${{ inputs.full_version }}-windows-x86_64.zip
          retention-days: 30
