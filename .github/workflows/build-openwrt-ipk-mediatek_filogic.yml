name: Build OpenWrt mediatek_filogic IPK

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      release:
        required: true
        type: string
      sdk_version:
        required: true
        type: string

env:
  SDK_URL: "https://downloads.openwrt.org/releases/24.10.6/targets/mediatek/filogic"
  SDK_NAME: "openwrt-sdk-24.10.6-mediatek-filogic_gcc-13.3.0_musl.Linux-x86_64"

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: debian:13

    steps:
      - uses: actions/checkout@v6

      - name: 更新 Makefile 版本号
        run: |
          sed -i "s/PKG_VERSION:=.*/PKG_VERSION:=${{ inputs.version }}/" esurfingclient/Makefile
          sed -i "s/PKG_RELEASE:=.*/PKG_RELEASE:=${{ inputs.release }}/" esurfingclient/Makefile

      - name: 安装软件包 (最多重试 3 次)
        run: |
          PACKAGES="build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev rsync wget ca-certificates unzip file zstd python3-setuptools swig"
          
          for i in 1 2 3; do
            echo "尝试 $i: 正在安装 $PACKAGES"
            if apt-get update && apt-get install -y $PACKAGES; then
              echo "✅ 所有软件包已完成安装"
              break
            fi
            echo "❌ 尝试 $i 失败"
            sleep 3
          done

      - name: 获取 OpenWrt SDK 压缩包缓存
        id: cache-openwrt-sdk
        uses: actions/cache@v5
        with:
          path: |
            ${{ env.SDK_NAME }}.tar.zst
          key: openwrt-mediatek_filogic-ipk-sdk-${{ inputs.sdk_version }}

      - name: 下载 SDK
        if: steps.cache-openwrt-sdk.outputs.cache-hit != 'true'
        run: |
          wget ${{ env.SDK_URL }}/${{ env.SDK_NAME }}.tar.zst -O ${{ env.SDK_NAME }}.tar.zst

      - name: 解压 SDK
        run: |
          tar -I zstd -xf ${{ env.SDK_NAME }}.tar.zst
          mv ${{ env.SDK_NAME }} openwrt-sdk

          cd openwrt-sdk

          make defconfig

      - name: 获取 OpenWrt 缓存
        id: cache-openwrt
        uses: actions/cache@v5
        with:
          path: |
            openwrt-sdk/staging_dir/
            openwrt-sdk/dl/
          key: openwrt-mediatek_filogic-sdk-${{ inputs.sdk_version }}-${{ hashFiles('.configs/mediatek_filogic-ipk.config') }}

      - name: 准备构建配置
        if: steps.cache-openwrt.outputs.cache-hit != 'true'
        run: |
          cd openwrt-sdk

          scripts/feeds update base
          scripts/feeds update packages
          
          scripts/feeds install openssl
          scripts/feeds install curl
          
          make defconfig
          
          cat ../.configs/mediatek_filogic-ipk.config >> .config

          make defconfig

      - name: 编译 libopenssl
        if: steps.cache-openwrt.outputs.cache-hit != 'true'
        run: |
          cd openwrt-sdk
          make package/openssl/compile -j$(nproc)

      - name: 编译 libcurl
        if: steps.cache-openwrt.outputs.cache-hit != 'true'
        run: |
          cd openwrt-sdk
          make package/curl/compile -j$(nproc)

      - name: 编译 esurfingclient
        run: |
          cp -r esurfingclient openwrt-sdk/package/
          
          cd openwrt-sdk
          
          scripts/feeds install esurfingclient
          
          make package/esurfingclient/compile -j$(nproc)

          find bin/packages -name "esurfingclient*.ipk" -exec cp {} ../esurfingclient_${{ inputs.version }}-${{ inputs.release }}_mediatek_filogic.ipk \;

      - name: 上传工件
        uses: actions/upload-artifact@v7
        with:
          name: esurfingclient_${{ inputs.version }}-${{ inputs.release }}_mediatek_filogic-ipk
          path: esurfingclient_${{ inputs.version }}-${{ inputs.release }}_mediatek_filogic.ipk
          retention-days: 30
