name: Build OpenWrt qualcommax_ipq60xx IPK

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
        default: "2.0.4"
      release:
        required: true
        type: string
        default: "6"
      sdk_version:
        required: true
        type: string
        default: "24.10.6"

env:
  SDK_URL: "https://openlist.xylg.com:20001/d/openwrt"
  SDK_NAME: "openwrt-sdk-qualcommax-ipq60xx_gcc-13.3.0_musl.Linux-x86_64"
  SIGN: "?sign=uAFe1eM2MaZDZySkAAxKMuU9Tn7QJdS6VklJfdjxZ9o=:0"

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: debian:13

    steps:
      - uses: actions/checkout@v6

      - name: 更新 Makefile 版本号
        run: |
          sed -i "s/PKG_VERSION:=.*/PKG_VERSION:=${{ inputs.version || '2.0.4' }}/" esurfingclient/Makefile
          sed -i "s/PKG_RELEASE:=.*/PKG_RELEASE:=${{ inputs.release || '6' }}/" esurfingclient/Makefile

      - name: 安装软件包 (最多重试 3 次)
        run: |
          PACKAGES="build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev rsync wget ca-certificates unzip file zstd python3-setuptools swig"
          
          for i in 1 2 3; do
            echo "尝试 $i: 正在安装 $PACKAGES"
            if apt-get update && apt-get install -y $PACKAGES; then
              echo "✅ 所有软件包已完成安装"
              break
            fi
            echo "❌ 尝试 $i 失败"
            sleep 3
          done

      - name: 获取 OpenWrt SDK 压缩包缓存
        id: cache-openwrt-sdk
        uses: actions/cache@v5
        with:
          path: |
            ${{ env.SDK_NAME }}.tar.zst
          key: openwrt-qualcommax_ipq60xx-ipk-sdk-${{ inputs.sdk_version || '24.10.6' }}

      - name: 下载 SDK
        if: steps.cache-openwrt-sdk.outputs.cache-hit != 'true'
        run: |
          wget ${{ env.SDK_URL }}/${{ env.SDK_NAME }}.tar.zst${{ env.SIGN }} -O ${{ env.SDK_NAME }}.tar.zst

      - name: 解压 SDK
        run: |
          tar -I zstd -xf ${{ env.SDK_NAME }}.tar.zst
          mv ${{ env.SDK_NAME }} openwrt-sdk

          cd openwrt-sdk

          make defconfig

      - name: 获取 OpenWrt 缓存
        id: cache-openwrt
        uses: actions/cache@v5
        with:
          path: |
            openwrt-sdk/staging_dir/
            openwrt-sdk/dl/
          key: openwrt-qualcommax_ipq60xx-sdk-${{ inputs.sdk_version || '24.10.6' }}-${{ hashFiles('.configs/qualcommax_ipq60xx-ipk.config') }}

      - name: 准备构建配置
        if: steps.cache-openwrt.outputs.cache-hit != 'true'
        run: |
          cd openwrt-sdk

          scripts/feeds update base
          scripts/feeds update packages
          
          scripts/feeds install openssl
          scripts/feeds install curl
          
          make defconfig
          
          cat ../.configs/qualcommax_ipq60xx-ipk.config >> .config

          make defconfig

      - name: 编译 libopenssl
        if: steps.cache-openwrt.outputs.cache-hit != 'true'
        run: |
          cd openwrt-sdk
          make package/openssl/compile -j$(nproc)

      - name: 编译 libcurl
        if: steps.cache-openwrt.outputs.cache-hit != 'true'
        run: |
          cd openwrt-sdk
          make package/curl/compile -j$(nproc)

      - name: 编译 esurfingclient
        run: |
          echo "验证源码..."
          grep -c CURLOPT_CONNECTTIMEOUT esurfingclient/esurfing/src/NetClient.c || true
          grep -c reset_network_state esurfingclient/esurfing/src/NetClient.c || true

          cd openwrt-sdk

          # 核武器方案: 先清理所有缓存，再复制新源码
          rm -rf build_dir/target-*/esurfingclient 2>/dev/null || true
          rm -rf staging_dir/target-*/root-*/usr/bin/esurfingclient 2>/dev/null || true
          rm -rf staging_dir/pkg/esurfingclient 2>/dev/null || true
          rm -rf bin/packages/*/base/esurfingclient* 2>/dev/null || true
          rm -rf bin/targets/*/packages/esurfingclient* 2>/dev/null || true

          cd ..

          cp -r esurfingclient openwrt-sdk/package/

          cd openwrt-sdk

          make defconfig

          make package/esurfingclient/compile -j$(nproc) V=s 2>&1 | tail -50

          find bin/packages -name "esurfingclient*.ipk" -exec cp {} ../esurfingclient_${{ inputs.version || '2.0.4' }}-${{ inputs.release || '6' }}_qualcommax_ipq60xx.ipk \;

      - name: 上传工件
        uses: actions/upload-artifact@v7
        with:
          name: esurfingclient_${{ inputs.version || '2.0.4' }}-${{ inputs.release || '6' }}_qualcommax_ipq60xx-ipk
          path: esurfingclient_${{ inputs.version || '2.0.4' }}-${{ inputs.release || '6' }}_qualcommax_ipq60xx.ipk
          retention-days: 30
