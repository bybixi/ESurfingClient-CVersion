name: Build All Platforms

permissions:
  actions: write
  contents: write

env:
  OPENSSL_VERSION: "4.0.0"
  CURL_VERSION: "8.20.0"
  OPENWRT_IPK_SDK_VERSION: "24.10.6"
  OPENWRT_APK_SDK_VERSION: "25.12.0"
  TAIL_WIND_LABS_VERSION: "v4.3.0"

on:
  workflow_dispatch:
    inputs:
      platforms:
        description: '选择要构建的平台'
        type: choice
        required: true
        default: 'all'
        options:
          - all
          - windows-x86_64
          - linux-x86_64
          - macos-x86_64
          - macos-arm64
          - openwrt-luci-ipk
          - openwrt-luci-apk
          - openwrt-x86_64-ipk
          - openwrt-x86_64-apk
          - openwrt-ramips_mt7621-ipk
          - openwrt-ramips_mt7621-apk
          - openwrt-mediatek_filogic-ipk
          - openwrt-mediatek_filogic-apk
          - openwrt-qualcommax_ipq60xx-ipk
          - openwrt-qualcommax_ipq60xx-apk

jobs:
  get-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      release: ${{ steps.version.outputs.release }}
      full_version: ${{ steps.version.outputs.full_version }}
      openssl_version: ${{ env.OPENSSL_VERSION }}
      curl_version: ${{ env.CURL_VERSION }}
      openwrt_ipk_sdk_version: ${{ env.OPENWRT_IPK_SDK_VERSION }}
      openwrt_apk_sdk_version: ${{ env.OPENWRT_APK_SDK_VERSION }}
      tail_wind_labs_version: ${{ env.TAIL_WIND_LABS_VERSION }}
    steps:
      - uses: actions/checkout@v6
      - name: 获取版本号
        id: version
        run: |
          cd esurfingclient/esurfing
          MAJOR=$(grep -oP 'set\(PROGRAM_VERSION_MAJOR \K\d+' CMakeLists.txt)
          MINOR=$(grep -oP 'set\(PROGRAM_VERSION_MINOR \K\d+' CMakeLists.txt)
          PATCH=$(grep -oP 'set\(PROGRAM_VERSION_PATCH \K\d+' CMakeLists.txt)
          RELEASE=$(grep -oP 'set\(PROGRAM_VERSION_RELEASE \K\d+' CMakeLists.txt)
          echo "version=${MAJOR}.${MINOR}.${PATCH}" >> $GITHUB_OUTPUT
          echo "release=${RELEASE}" >> $GITHUB_OUTPUT
          echo "full_version=${MAJOR}.${MINOR}.${PATCH}-r${RELEASE}" >> $GITHUB_OUTPUT

      - name: 展示版本号
        run: |
          echo "Version: ${{ steps.version.outputs.version }}"
          echo "Release: ${{ steps.version.outputs.release }}"
          echo "Full version: ${{ steps.version.outputs.full_version }}"

  windows-x86_64:
    if: github.event.inputs.platforms == 'all' || github.event.inputs.platforms == 'windows-x86_64'
    uses: ./.github/workflows/build-desktop-x86_64-windows.yml
    secrets: inherit
    needs: get-version
    with:
      full_version: ${{ needs.get-version.outputs.full_version }}
      openssl_version: ${{ needs.get-version.outputs.openssl_version }}
      curl_version: ${{ needs.get-version.outputs.curl_version }}
      tail_wind_labs_version: ${{ needs.get-version.outputs.tail_wind_labs_version }}

  linux-x86_64:
    if: github.event.inputs.platforms == 'all' || github.event.inputs.platforms == 'linux-x86_64'
    uses: ./.github/workflows/build-desktop-x86_64-linux.yml
    secrets: inherit
    needs: get-version
    with:
      full_version: ${{ needs.get-version.outputs.full_version }}
      openssl_version: ${{ needs.get-version.outputs.openssl_version }}
      curl_version: ${{ needs.get-version.outputs.curl_version }}
      tail_wind_labs_version: ${{ needs.get-version.outputs.tail_wind_labs_version }}

  macos-x86_64:
    if: github.event.inputs.platforms == 'all' || github.event.inputs.platforms == 'macos-x86_64'
    uses: ./.github/workflows/build-desktop-x86_64-macos.yml
    secrets: inherit
    needs: get-version
    with:
      full_version: ${{ needs.get-version.outputs.full_version }}
      openssl_version: ${{ needs.get-version.outputs.openssl_version }}
      curl_version: ${{ needs.get-version.outputs.curl_version }}
      tail_wind_labs_version: ${{ needs.get-version.outputs.tail_wind_labs_version }}

  macos-arm64:
    if: github.event.inputs.platforms == 'all' || github.event.inputs.platforms == 'macos-arm64'
    uses: ./.github/workflows/build-desktop-arm64-macos.yml
    secrets: inherit
    needs: get-version
    with:
      full_version: ${{ needs.get-version.outputs.full_version }}
      openssl_version: ${{ needs.get-version.outputs.openssl_version }}
      curl_version: ${{ needs.get-version.outputs.curl_version }}
      tail_wind_labs_version: ${{ needs.get-version.outputs.tail_wind_labs_version }}

  openwrt-luci-ipk:
    if: github.event.inputs.platforms == 'all' || github.event.inputs.platforms == 'openwrt-luci-ipk'
    uses: ./.github/workflows/build-openwrt-luci-ipk-all.yml
    secrets: inherit
    needs: get-version
    with:
      version: ${{ needs.get-version.outputs.version }}
      release: ${{ needs.get-version.outputs.release }}
      sdk_version: ${{ needs.get-version.outputs.openwrt_ipk_sdk_version }}

  openwrt-luci-apk:
    if: github.event.inputs.platforms == 'all' || github.event.inputs.platforms == 'openwrt-luci-apk'
    uses: ./.github/workflows/build-openwrt-luci-apk-all.yml
    secrets: inherit
    needs: get-version
    with:
      version: ${{ needs.get-version.outputs.version }}
      release: ${{ needs.get-version.outputs.release }}
      sdk_version: ${{ needs.get-version.outputs.openwrt_apk_sdk_version }}

  openwrt-x86_64-ipk:
    if: github.event.inputs.platforms == 'all' || github.event.inputs.platforms == 'openwrt-x86_64-ipk'
    uses: ./.github/workflows/build-openwrt-ipk-x86_64.yml
    secrets: inherit
    needs: get-version
    with:
      version: ${{ needs.get-version.outputs.version }}
      release: ${{ needs.get-version.outputs.release }}
      sdk_version: ${{ needs.get-version.outputs.openwrt_ipk_sdk_version }}

  openwrt-x86_64-apk:
    if: github.event.inputs.platforms == 'all' || github.event.inputs.platforms == 'openwrt-x86_64-apk'
    uses: ./.github/workflows/build-openwrt-apk-x86_64.yml
    secrets: inherit
    needs: get-version
    with:
      version: ${{ needs.get-version.outputs.version }}
      release: ${{ needs.get-version.outputs.release }}
      sdk_version: ${{ needs.get-version.outputs.openwrt_apk_sdk_version }}

  openwrt-ramips_mt7621-ipk:
    if: github.event.inputs.platforms == 'all' || github.event.inputs.platforms == 'openwrt-ramips_mt7621-ipk'
    uses: ./.github/workflows/build-openwrt-ipk-ramips_mt7621.yml
    secrets: inherit
    needs: get-version
    with:
      version: ${{ needs.get-version.outputs.version }}
      release: ${{ needs.get-version.outputs.release }}
      sdk_version: ${{ needs.get-version.outputs.openwrt_ipk_sdk_version }}

  openwrt-ramips_mt7621-apk:
    if: github.event.inputs.platforms == 'all' || github.event.inputs.platforms == 'openwrt-ramips_mt7621-apk'
    uses: ./.github/workflows/build-openwrt-apk-ramips_mt7621.yml
    secrets: inherit
    needs: get-version
    with:
      version: ${{ needs.get-version.outputs.version }}
      release: ${{ needs.get-version.outputs.release }}
      sdk_version: ${{ needs.get-version.outputs.openwrt_apk_sdk_version }}

  openwrt-mediatek_filogic-ipk:
    if: github.event.inputs.platforms == 'all' || github.event.inputs.platforms == 'openwrt-mediatek_filogic-ipk'
    uses: ./.github/workflows/build-openwrt-ipk-mediatek_filogic.yml
    secrets: inherit
    needs: get-version
    with:
      version: ${{ needs.get-version.outputs.version }}
      release: ${{ needs.get-version.outputs.release }}
      sdk_version: ${{ needs.get-version.outputs.openwrt_ipk_sdk_version }}

  openwrt-mediatek_filogic-apk:
    if: github.event.inputs.platforms == 'all' || github.event.inputs.platforms == 'openwrt-mediatek_filogic-apk'
    uses: ./.github/workflows/build-openwrt-apk-mediatek_filogic.yml
    secrets: inherit
    needs: get-version
    with:
      version: ${{ needs.get-version.outputs.version }}
      release: ${{ needs.get-version.outputs.release }}
      sdk_version: ${{ needs.get-version.outputs.openwrt_apk_sdk_version }}

  openwrt-qualcommax_ipq60xx-ipk:
    if: github.event.inputs.platforms == 'all' || github.event.inputs.platforms == 'openwrt-qualcommax_ipq60xx-ipk'
    uses: ./.github/workflows/build-openwrt-ipk-qualcommax_ipq60xx.yml
    secrets: inherit
    needs: get-version
    with:
      version: ${{ needs.get-version.outputs.version }}
      release: ${{ needs.get-version.outputs.release }}
      sdk_version: ${{ needs.get-version.outputs.openwrt_ipk_sdk_version }}

  openwrt-qualcommax_ipq60xx-apk:
    if: github.event.inputs.platforms == 'all' || github.event.inputs.platforms == 'openwrt-qualcommax_ipq60xx-apk'
    uses: ./.github/workflows/build-openwrt-apk-qualcommax_ipq60xx.yml
    secrets: inherit
    needs: get-version
    with:
      version: ${{ needs.get-version.outputs.version }}
      release: ${{ needs.get-version.outputs.release }}
      sdk_version: ${{ needs.get-version.outputs.openwrt_apk_sdk_version }}

  release:
    needs:
      - windows-x86_64
      - linux-x86_64
      - macos-x86_64
      - macos-arm64
      - openwrt-luci-ipk
      - openwrt-x86_64-ipk
      - openwrt-ramips_mt7621-ipk
      - openwrt-mediatek_filogic-ipk
      - openwrt-qualcommax_ipq60xx-ipk
      - openwrt-luci-apk
      - openwrt-x86_64-apk
      - openwrt-ramips_mt7621-apk
      - openwrt-mediatek_filogic-apk
      - openwrt-qualcommax_ipq60xx-apk
    runs-on: ubuntu-latest
    if: always() && !cancelled()
    steps:
      - uses: actions/checkout@v6

      - name: 下载所有工件
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: 列出所有下载的文件
        run: |
          echo "已下载工件:"
          find artifacts -type f \( -name "*.zip" -o -name "*.ipk" -o -name "*.apk" -o -name "*.tar.gz" \) | sort

      - name: 创建 Release 包
        run: |
          export TZ='Asia/Shanghai'
          TIMESTAMP=$(date +"%Y%m%d-%H%M%S")
          RELEASE_NAME="ESurfing Client Build - $(date +'%Y-%m-%d %H:%M:%S CST')"
          echo "RELEASE_NAME=${RELEASE_NAME}" >> $GITHUB_ENV
          
          echo "Release 名称: ${RELEASE_NAME}"
          
          mkdir -p release_package
          
          find artifacts -type f \( -name "*.zip" -o -name "*.ipk" -o -name "*.apk" -o -name "*.tar.gz" \) -exec cp {} release_package/ \;
          
          cd release_package
          zip -r "../master-latest.zip" .
          cd ..
          
          echo "已创建压缩包: master-latest.zip"
          ls -lh "master-latest.zip"

      - name: 清理 GitHub Prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete master-latest -y --cleanup-tag

      - name: 创建 GitHub Prerelease
        uses: softprops/action-gh-release@v3
        with:
          tag_name: 'master-latest'
          name: ${{ env.RELEASE_NAME }}
          files: master-latest.zip
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
